<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shiori Swipe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="anime_db.js"></script>
    <style>
        /* БАЗОВЫЕ СТИЛИ (Оставил всё красивым как было) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f13; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; position: relative; }

        .card-container { position: relative; width: 90%; max-width: 400px; height: 75vh; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); z-index: 10; background: #1a1a24; }
        .poster { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; pointer-events: none; }
        .info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 80px 20px 20px 20px; background: linear-gradient(to top, rgba(15,15,19,1) 10%, transparent 100%); z-index: 2; pointer-events: none;}
        .title { font-size: 26px; font-weight: bold; margin-bottom: 8px; text-shadow: 1px 1px 5px #000; }
        .tags { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        .description { font-size: 14px; color: #ccc; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* ПОДСКАЗКА: Стили для кнопки фильтров и самого окна фильтров */
        .filter-btn { position: absolute; top: 20px; right: 20px; z-index: 100; background: rgba(255,255,255,0.1); border: none; padding: 10px; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; }
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
        .modal h2 { margin-bottom: 20px; color: #FFD700; }
        .modal select { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; background: #232330; color: white; border: 1px solid #444; font-size: 16px; }
        .modal button { background: #FFD700; color: black; padding: 15px 40px; border-radius: 20px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; }

        /* ПОДСКАЗКА: Экран Мэтча (когда совпало с другом) */
        .match-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 20, 147, 0.95); z-index: 300; justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px; }
        .match-screen h1 { font-size: 40px; color: white; font-style: italic; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .match-poster { width: 200px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .match-btn { background: white; color: #ff1493; padding: 15px 30px; border-radius: 20px; font-weight: bold; border: none; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- Кнопка вызова фильтров -->
    <button class="filter-btn" onclick="openFilters()">⚙️</button>

    <!-- Главная карточка -->
    <div class="card-container" id="card">
        <img id="card-image" class="poster" src="">
        <div class="info">
            <div id="card-title" class="title">Загрузка...</div>
            <div id="card-tags" class="tags"></div>
            <div id="card-desc" class="description"></div>
        </div>
    </div>

    <!-- ПОДСКАЗКА: Всплывающее окно Фильтров -->
    <div class="modal" id="filter-modal">
        <h2>Настройки поиска</h2>
        <select id="genre-select">
            <option value="all">Все жанры</option>
            <option value="Сёнен">Сёнен</option>
            <option value="Комедия">Комедия</option>
            <option value="Романтика">Романтика</option>
            <option value="Экшен">Экшен</option>
        </select>
        <button onclick="applyFilters()">Применить</button>
    </div>

    <!-- ПОДСКАЗКА: Всплывающее окно Мэтча -->
    <div class="match-screen" id="match-screen">
        <h1>IT'S A MATCH! 🔥</h1>
        <p style="margin-bottom: 10px;">Вы с другом оба лайкнули:</p>
        <img id="match-img" class="match-poster" src="">
        <h2 id="match-title"></h2>
        <button class="match-btn" onclick="closeMatch()">Продолжить свайпать</button>
    </div>

    <script>
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) tg.expand();

        let animeDeck = [];
        let currentIndex = 0;
        let currentFilter = 'all'; // Храним текущий выбранный фильтр

        // --- ЛОГИКА ФИЛЬТРОВ ---
        function openFilters() { document.getElementById('filter-modal').style.display = 'flex'; }

        function applyFilters() {
            currentFilter = document.getElementById('genre-select').value;
            document.getElementById('filter-modal').style.display = 'none';
            loadAnime(); // Перезагружаем колоду с новыми фильтрами
        }

        // --- ЛОГИКА ЗАГРУЗКИ (С ФИЛЬТРАЦИЕЙ) ---
        function loadAnime() {
            let filteredDB = localDB; // localDB берется из anime_db.js

            // Если выбран конкретный жанр, фильтруем базу
            if (currentFilter !== 'all') {
                filteredDB = localDB.filter(anime => anime.tags.includes(currentFilter));
            }

            if (filteredDB.length === 0) {
                alert("По этому фильтру ничего не найдено!");
                return;
            }

            // Перемешиваем и берем 20 штук
            const shuffled = filteredDB.sort(() => 0.5 - Math.random());
            animeDeck = shuffled.slice(0, 20);
            currentIndex = 0;
            renderCard();
        }

        function renderCard() {
            if (currentIndex >= animeDeck.length) {
                document.getElementById('card').innerHTML = "<h2 style='text-align:center; margin-top:60%; color: #FFD700;'>Аниме закончились! 🎬</h2>";
                return;
            }
            const currentAnime = animeDeck[currentIndex];
            document.getElementById('card-title').innerText = currentAnime.t;
            document.getElementById('card-desc').innerText = currentAnime.d;
            document.getElementById('card-image').src = currentAnime.i;
            document.getElementById('card-tags').innerHTML = currentAnime.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
        }

        // --- ЛОГИКА СОХРАНЕНИЯ В ПРОФИЛЬ ---
        function saveToDiary(anime, status) {
            let diary = JSON.parse(localStorage.getItem('shiori_diary') || '[]');
            if (!diary.find(a => a.title === anime.t)) {
                // Сохраняем не только название, но и статус (смотрел или в планах)
                diary.push({ title: anime.t, image: anime.i, status: status });
                localStorage.setItem('shiori_diary', JSON.stringify(diary));
            }
        }

        // --- ЛОГИКА МЭТЧЕЙ (ИМИТАЦИЯ) ---
        function checkMatch(anime) {
            // ПОДСКАЗКА: В реальном проекте тут будет запрос на сервер к другу.
            // Сейчас мы делаем шанс 10%, что выскочит мэтч (для красоты прототипа)
            if (Math.random() < 0.1) {
                if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                document.getElementById('match-title').innerText = anime.t;
                document.getElementById('match-img').src = anime.i;
                document.getElementById('match-screen').style.display = 'flex';
            }
        }
        function closeMatch() { document.getElementById('match-screen').style.display = 'none'; nextCard(); }

        // --- СВАЙПЫ ---
        const card = document.getElementById('card');
        let isDragging = false, startX = 0, startY = 0, currentX = 0, currentY = 0;

        card.addEventListener('touchstart', (e) => {
            isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; card.style.transition = 'none';
        }, {passive: true});

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX - startX; currentY = e.touches[0].clientY - startY;
            card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${currentX * 0.05}deg)`;
        }, {passive: true});

        document.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false; card.style.transition = 'transform 0.3s';

            const anime = animeDeck[currentIndex];

            if (currentY < -100 && Math.abs(currentY) > Math.abs(currentX)) {
                // Свайп ВВЕРХ (Уже смотрел)
                saveToDiary(anime, "watched");
                card.style.transform = `translate(${currentX}px, -1000px)`;
                nextCard();
            } else if (currentX > 100) {
                // Свайп ВПРАВО (В планы)
                saveToDiary(anime, "plan");
                card.style.transform = `translate(1000px, ${currentY}px)`;
                // Проверяем, не лайкнул ли это друг
                checkMatch(anime);
                // Заметь: если выскочил мэтч, функция nextCard() вызовется после закрытия окна мэтча
                if(document.getElementById('match-screen').style.display !== 'flex') nextCard();
            } else if (currentX < -100) {
                // Свайп ВЛЕВО (Скип)
                card.style.transform = `translate(-1000px, ${currentY}px)`;
                nextCard();
            } else {
                card.style.transform = 'translate(0px, 0px) rotate(0deg)'; // Возврат
            }
        });

        function nextCard() { setTimeout(() => { currentIndex++; card.style.transition = 'none'; card.style.transform = 'translate(0px,0px)'; renderCard(); }, 300); }

        // Старт
        loadAnime();
    </script>
</body>
</html>
