<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shiori - AniSwipe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- ПОДКЛЮЧАЕМ НАШУ СГЕНЕРИРОВАННУЮ БАЗУ (ЭТО ВАЖНО!) -->
    <script src="anime_db.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #0f0f13; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; position: relative; }

        .card-container { position: relative; width: 90%; max-width: 400px; height: 75vh; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); z-index: 10; background: #1a1a24; }
        .poster { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transition: opacity 0.3s; }

        .info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 80px 20px 20px 20px; background: linear-gradient(to top, rgba(15, 15, 19, 1) 10%, rgba(15, 15, 19, 0.9) 60%, transparent 100%); z-index: 2; pointer-events: none;}
        .title { font-size: 26px; font-weight: bold; margin-bottom: 8px; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        .rating { color: #FFD700; font-weight: bold; font-size: 15px; margin-bottom: 12px; }
        .tags { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); padding: 6px 14px; border-radius: 12px; font-size: 13px; font-weight: bold;}
        .description { font-size: 14px; color: #e4e4e7; line-height: 1.4; }

        .swipe-up-hint { position: absolute; top: 30px; width: 100%; text-align: center; font-size: 16px; font-weight: bold; opacity: 0; z-index: 20; pointer-events: none; transition: opacity 0.5s ease; }
        .swipe-bottom-hints { position: absolute; bottom: 30px; width: 100%; max-width: 400px; display: flex; justify-content: space-between; padding: 0 30px; font-size: 16px; font-weight: bold; opacity: 0; z-index: 20; pointer-events: none; transition: opacity 0.5s ease; }
    </style>
</head>
<body>

    <div class="swipe-up-hint">👆 Уже смотрел</div>

    <div class="card-container">
        <img id="card-image" class="poster" src="" style="opacity: 0;">
        <div class="info">
            <div id="card-title" class="title">Загрузка...</div>
            <div id="card-rating" class="rating"></div>
            <div id="card-tags" class="tags"></div>
            <div id="card-desc" class="description"></div>
        </div>
    </div>

    <div class="swipe-bottom-hints">
        <span>👈 Нафиг</span>
        <span>Буду смотреть 👉</span>
    </div>

    <script>
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg && tg.initData) { tg.ready(); tg.expand(); }

        function vibe(type) {
            if (tg && tg.HapticFeedback) {
                if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
                if (type === 'medium') tg.HapticFeedback.notificationOccurred('warning');
                if (type === 'light') tg.HapticFeedback.impactOccurred('heavy');
            }
        }

        let animeDeck = [];
        let currentIndex = 0;
        let userChoices = [];

        function loadAnime() {
            // localDB загружается автоматически из файла anime_db.js!
            if (typeof localDB === 'undefined' || localDB.length === 0) {
                document.getElementById('card-title').innerText = "Ошибка базы 😢";
                return;
            }

            // Перемешиваем огромную базу и берем 15 случайных карточек для одной сессии свайпов
            const shuffled = localDB.sort(() => 0.5 - Math.random());
            animeDeck = shuffled.slice(0, 15).map(anime => ({
                title: anime.t,
                rating: anime.r,
                tags: anime.tags,
                desc: anime.d,
                image: anime.i
            }));

            document.getElementById('card-image').style.opacity = '1';
            currentIndex = 0;
            renderCard();
        }

        function renderCard() {
            if (currentIndex >= animeDeck.length) {
                if (tg && userChoices.length > 0) tg.sendData(JSON.stringify(userChoices));
                document.querySelector('.card-container').innerHTML = "<h2 style='text-align:center; margin-top:60%; color: #FFD700;'>Пачка сохранена! 📚</h2>";
                return;
            }

            const currentAnime = animeDeck[currentIndex];
            document.getElementById('card-title').innerText = currentAnime.title;
            document.getElementById('card-rating').innerText = `🌍 Оценка: ${currentAnime.rating} ⭐️`;
            document.getElementById('card-desc').innerText = currentAnime.desc;
            document.getElementById('card-image').src = currentAnime.image;

            const tagsHtml = currentAnime.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            document.getElementById('card-tags').innerHTML = tagsHtml;

            hints.forEach(hint => hint.style.opacity = '0.8');
        }

        const card = document.querySelector('.card-container');
        const hints = document.querySelectorAll('.swipe-up-hint, .swipe-bottom-hints');
        let isDragging = false, startX = 0, startY = 0, currentX = 0, currentY = 0;

        card.addEventListener('mousedown', startDrag);
        card.addEventListener('touchstart', startDrag, {passive: true});
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, {passive: true});
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        function startDrag(e) {
            isDragging = true;
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
            startY = e.type.includes('mouse') ? e.pageY : e.touches[0].clientY;
            card.style.transition = 'none';
            hints.forEach(hint => hint.style.opacity = '0');
        }

        function drag(e) {
            if (!isDragging) return;
            const x = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
            const y = e.type.includes('mouse') ? e.pageY : e.touches[0].clientY;
            currentX = x - startX; currentY = y - startY;
            const rotate = currentX * 0.05;
            card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg)`;
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            card.style.transition = 'transform 0.3s ease-out';

            if(animeDeck.length === 0) { resetCard(); return; }

            const animeTitle = animeDeck[currentIndex].title;

            if (currentY < -100 && Math.abs(currentY) > Math.abs(currentX)) {
                vibe('success');
                userChoices.push({ action: "watched", anime: animeTitle });
                card.style.transform = `translate(${currentX}px, -1000px) rotate(${currentX * 0.05}deg)`;
                nextCard();
            } else if (Math.abs(currentX) > 100) {
                vibe('medium');
                const direction = currentX > 0 ? 1 : -1;
                userChoices.push({ action: direction > 0 ? "like" : "skip", anime: animeTitle });
                card.style.transform = `translate(${direction * 1000}px, ${currentY}px) rotate(${direction * 30}deg)`;
                nextCard();
            } else {
                vibe('light');
                resetCard();
            }
        }

        function nextCard() { setTimeout(() => { currentIndex++; resetCard(); renderCard(); }, 300); }
        function resetCard() { card.style.transition = 'none'; card.style.transform = 'translate(0px, 0px) rotate(0deg)'; currentX = 0; currentY = 0; }

        loadAnime();
    </script>
</body>
</html>
