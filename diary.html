<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой Дневник - Shiori</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f13; color: white; padding: 20px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: #FFD700; font-size: 22px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #1a1a24; border-radius: 16px; overflow: hidden; position: relative; border: 1px solid #232330; transition: transform 0.2s; cursor: pointer; }
        .card:active { transform: scale(0.98); }
        .card img { width: 100%; height: 180px; object-fit: cover; opacity: 0.8; }
        .card-info { padding: 10px; }
        .title { font-size: 13px; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .progress-container { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: #FFD700; transition: width 0.3s; }

        /* Всплывающее окно */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: flex-end; backdrop-filter: blur(5px); }
        /* ИЗМЕНЕНИЕ: Делаем окно выше и гибче */
        .modal-content { background: #1a1a24; width: 100%; max-height: 90vh; height: 90vh; padding: 20px; border-radius: 24px 24px 0 0; display: flex; flex-direction: column; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* ИЗМЕНЕНИЕ: Картинка теперь не обрезается, а подстраивается */
        .modal-banner { width: 100%; max-height: 200px; object-fit: contain; background: #0f0f13; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .modal-title { font-size: 20px; color: #FFD700; margin-bottom: 10px; text-align: center;}

        /* ИЗМЕНЕНИЕ: Описание теперь прокручивается, если оно длинное */
        .modal-desc { font-size: 13px; color: #aaa; margin-bottom: 15px; line-height: 1.4; max-height: 80px; overflow-y: auto; padding-right: 5px; border-bottom: 1px solid #333; padding-bottom: 10px;}

        /* Список серий */
        .ep-list { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 20px; }
        .ep-row { display: flex; justify-content: space-between; align-items: center; background: #232330; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; }

        /* Стилизация красивых галочек */
        input[type="checkbox"] { appearance: none; width: 24px; height: 24px; border: 2px solid #555; border-radius: 6px; background: transparent; cursor: pointer; position: relative; transition: 0.2s; }
        input[type="checkbox"]:checked { background: #FFD700; border-color: #FFD700; }
        input[type="checkbox"]:checked::after { content: "✔"; position: absolute; color: black; font-weight: bold; font-size: 16px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .modal-btn { width: 100%; padding: 15px; border-radius: 16px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; flex-shrink: 0;}
        .save-btn { background: #333; color: white; margin-bottom: 10px; }
        .delete-btn-red { color: #ff4d4d; font-size: 14px; background: none; border: none; width: 100%; padding: 10px; cursor: pointer; flex-shrink: 0;}

        /* Скрываем скроллбар для красоты */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Shiori Diary 🌸</h1>
    </div>

    <div class="grid" id="diary-grid"></div>

    <!-- ОКНО АНИМЕ -->
    <div class="modal" id="track-modal" onclick="closeOnBg(event)">
        <div class="modal-content" id="track-content">
            <!-- Вставляется через JS -->
        </div>
    </div>

    <script>
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) tg.expand();

        let currentTrackIndex = null;

        // --- ЗАГРУЗКА СПИСКА НА ГЛАВНЫЙ ЭКРАН ---
        function loadDiary() {
            const grid = document.getElementById('diary-grid');
            let diary = JSON.parse(localStorage.getItem('shiori_diary') || '[]');

            if (diary.length === 0) {
                grid.innerHTML = '<p style="grid-column: span 2; text-align: center; color: #555; margin-top: 40px;">Список пуст. Иди свайпать!</p>';
                return;
            }

            grid.innerHTML = diary.map((anime, index) => {
                // Защита от старых сохранений, где не было watchedEps
                if (!anime.watchedEps) anime.watchedEps = [];
                if (!anime.totalEps) anime.totalEps = 12;

                const progress = (anime.watchedEps.length / anime.totalEps) * 100;

                return `
                <div class="card" onclick="openTrackModal(${index})">
                    <img src="${anime.image}">
                    <div class="card-info">
                        <div class="title">${anime.title}</div>
                        <div style="font-size: 11px; color: #888;">Просмотрено: ${anime.watchedEps.length} / ${anime.totalEps}</div>
                        <div class="progress-container">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // --- ОКНО С ПОСТЕРОМ И СЕРИЯМИ ---
        function openTrackModal(index) {
            currentTrackIndex = index;
            let diary = JSON.parse(localStorage.getItem('shiori_diary') || '[]');
            const anime = diary[index];

            // Защита данных
            if (!anime.watchedEps) anime.watchedEps = [];
            const desc = anime.desc || "Описание отсутствует. Возможно, аниме было добавлено до обновления базы.";

            let epsHTML = '';
            for (let i = 1; i <= anime.totalEps; i++) {
                const isChecked = anime.watchedEps.includes(i) ? 'checked' : '';
                epsHTML += `
                    <label class="ep-row">
                        <span style="font-weight: 500;">Серия ${i}</span>
                        <input type="checkbox" ${isChecked} onchange="toggleEp(${index}, ${i})">
                    </label>
                `;
            }

            const content = document.getElementById('track-content');
            content.innerHTML = `
                <img src="${anime.image}" class="modal-banner">
                <h2 class="modal-title">${anime.title}</h2>
                <div class="modal-desc">${desc}</div>

                <div class="ep-list">
                    ${epsHTML}
                </div>

                <button class="modal-btn save-btn" onclick="closeModals()">Закрыть</button>
                <button class="delete-btn-red" onclick="deleteAnime()">Удалить тайтл</button>
            `;
            document.getElementById('track-modal').style.display = 'flex';
        }

        // --- ЛОГИКА ГАЛОЧЕК ---
        function toggleEp(animeIndex, epNumber) {
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

            let diary = JSON.parse(localStorage.getItem('shiori_diary') || '[]');
            let anime = diary[animeIndex];

            // Если серия уже есть в массиве - удаляем, если нет - добавляем
            if (anime.watchedEps.includes(epNumber)) {
                anime.watchedEps = anime.watchedEps.filter(ep => ep !== epNumber);
            } else {
                anime.watchedEps.push(epNumber);
            }

            // Обновляем статус
            anime.status = (anime.watchedEps.length === anime.totalEps) ? 'watched' : 'plan';

            localStorage.setItem('shiori_diary', JSON.stringify(diary));
            loadDiary(); // Обновляем прогресс-бар на фоне
        }

        function closeModals() {
            document.getElementById('track-modal').style.display = 'none';
        }

        // Закрытие при клике мимо карточки
        function closeOnBg(e) {
            if (e.target.id === 'track-modal') closeModals();
        }

        function deleteAnime() {
            if(confirm("Удалить этот тайтл?")) {
                let diary = JSON.parse(localStorage.getItem('shiori_diary') || '[]');
                diary.splice(currentTrackIndex, 1);
                localStorage.setItem('shiori_diary', JSON.stringify(diary));
                closeModals();
                loadDiary();
            }
        }

        loadDiary();
    </script>
</body>
</html>
